apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-webhooks
  namespace: monitoring
  labels:
    app: alert-webhooks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-webhooks
  template:
    metadata:
      labels:
        app: alert-webhooks
    spec:
      containers:
      - name: alert-webhooks
        image: alert-webhooks:latest
        ports:
        - containerPort: 9999
        env:
        # Metric 認證
        - name: METRIC_USER
          valueFrom:
            secretKeyRef:
              name: alert-webhooks-secrets
              key: metric-user
        - name: METRIC_PASSWORD
          valueFrom:
            secretKeyRef:
              name: alert-webhooks-secrets
              key: metric-password
        
        # Webhooks 認證
        - name: WEBHOOKS_USER
          valueFrom:
            secretKeyRef:
              name: alert-webhooks-secrets
              key: webhooks-user
        - name: WEBHOOKS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: alert-webhooks-secrets
              key: webhooks-password
        
        # Telegram Token
        - name: TELEGRAM_TOKEN
          valueFrom:
            secretKeyRef:
              name: alert-webhooks-secrets
              key: telegram-token
        
        # Slack Token
        - name: SLACK_TOKEN
          valueFrom:
            secretKeyRef:
              name: alert-webhooks-secrets
              key: slack-token
        
        # 應用環境
        - name: APP_ENV
          value: "production"
        
        volumeMounts:
        - name: config-volume
          mountPath: /app/configs
          readOnly: true
        
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
            
        livenessProbe:
          httpGet:
            path: /health
            port: 9999
          initialDelaySeconds: 30
          periodSeconds: 10
          
        readinessProbe:
          httpGet:
            path: /ready
            port: 9999
          initialDelaySeconds: 5
          periodSeconds: 5

      volumes:
      - name: config-volume
        configMap:
          name: alert-webhooks-config

---
apiVersion: v1
kind: Secret
metadata:
  name: alert-webhooks-secrets
  namespace: monitoring
type: Opaque
data:
  # 這些值需要是 base64 編碼的
  # 使用 kubectl create secret 創建或者手動編碼
  metric-user: YWRtaW4=  # admin
  metric-password: cGFzc3dvcmQ=  # password
  webhooks-user: YWRtaW4=  # admin
  webhooks-password: cGFzc3dvcmQ=  # password
  telegram-token: eW91ci10ZWxlZ3JhbS1ib3QtdG9rZW4=  # your-telegram-bot-token
  slack-token: eG94Yi15b3VyLXNsYWNrLXRva2Vu  # xoxb-your-slack-token

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alert-webhooks-config
  namespace: monitoring
data:
  config.production.yaml: |
    app:
      version: "1.0.0"
      mode: "production"
      port: "9999"

    metric:
      # 這些值會被環境變數覆蓋
      user: "default-user"
      password: "default-password"

    log:
      level: "info"
      format: "json"

    telegram:
      # 明確啟用 Telegram 服務（預設為 false）
      enable: true
      # token 會被環境變數覆蓋
      token: "default-token"
      chat_ids0: "-1001234567890"
      chat_ids1: "-1001234567891"
      chat_ids2: "-1001234567892"
      chat_ids3: "-1001234567893"
      chat_ids4: "-1001234567894"
      chat_ids5: "-1001234567895"
      template_mode: "full"
      template_language: "tw"

    webhooks:
      # 明確啟用 Webhooks 服務（預設為 false）
      enable: true
      # 這些值會被環境變數覆蓋
      base_auth_user: "default-user"
      base_auth_password: "default-password"

    slack:
      # 明確啟用 Slack 服務（預設為 false）
      enable: true
      # token 會被環境變數覆蓋
      token: "default-token"
      channel: "#alerts"
      username: "AlertBot"
      icon_emoji: ":warning:"
      channels:
        chat_ids0: "#alerts-critical"
        chat_ids1: "#alerts-warning"
        chat_ids2: "#alerts-info"
        chat_ids3: "#alerts-low"
        chat_ids4: "#alerts-debug"
        chat_ids5: "#alerts-other"
      link_names: true
      unfurl_links: false
      unfurl_media: false
      template_mode: "full"
      template_language: "tw"

---
apiVersion: v1
kind: Service
metadata:
  name: alert-webhooks-service
  namespace: monitoring
  labels:
    app: alert-webhooks
spec:
  selector:
    app: alert-webhooks
  ports:
  - name: http
    port: 80
    targetPort: 9999
    protocol: TCP
  type: ClusterIP
