# Production values for alert-webhooks-chart
# Copy this file and customize with your actual values

# Image configuration
image:
  repository: 952149722289.dkr.ecr.ap-northeast-1.amazonaws.com/alert-webhooks
  tag: "v1.2"

replicaCount: 1

# Ingress configuration
ingress:
  enabled: true
  annotations:
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:ap-northeast-1:952149722289:certificate/1d33a105-b941-4f82-b38b-d16f0a4addd4"
  hosts:
    - host: gogo.imdevs.net
      paths:
        - path: /
          pathType: Prefix

# Production secrets (override these with your actual values)
secrets:
  metric:
    user: "admin"
    password: "admin"
  webhooks:
    user: "admin"
    password: "admin"
  telegram:
    token: "your-telegram-bot-token"
  slack:
    token: "your-slack-bot-token"
  discord:
    token: "your-discord-bot-token"

# Production resource limits
resources:
  limits:
    cpu: 256m
    memory: 256Mi
  requests:
    cpu: 128m
    memory: 256Mi

# Enable autoscaling in production
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Environment variables for production
env:
  - name: SWAGGER_HOST
    value: "gogo.imdevs.net"

# Production application configuration overrides
config:
  app:
    # version override
    version: "v1.2"

  # telegram config override
  telegram:
    chat_ids:
      - "-1002465088995"
      - "-1002465088995"
      - "-1002465088995"
      - "-1002465088995"
      - "-1002465088995"
      - "-1002465088995"
    template_language: "eng"

  # slack config override
  slack:
    channels:
      chat_ids0: "#alert0"
      chat_ids1: "#alert1"
      chat_ids2: "#alert0"
      chat_ids3: "#alert0"
      chat_ids4: "#alert0"
      chat_ids5: "#alert0"

  # discord config override
  discord:
    guild_id: "1407990039605936168"
    channels:
      chat_ids0: "1407992959202492456"
      chat_ids1: "1407993012717621349"
      chat_ids2: "987654321098765434"
      chat_ids3: "987654321098765435"
      chat_ids4: "987654321098765436"
      chat_ids5: "987654321098765437"
    username: "alert-bot"
