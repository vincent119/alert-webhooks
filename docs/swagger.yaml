paths:
  /api/v1/slack/channel/{channel}:
    post:
      consumes:
      - application/json
      description: 發送訊息到指定的 Slack 頻道
      parameters:
      - description: '頻道名稱 (例如: alerts, emergency)'
        in: path
        name: channel
        required: true
        type: string
      - description: 發送訊息請求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/routes_api_v1_slack.SendMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
      security:
      - BasicAuth: []
      summary: 發送 Slack 訊息到指定頻道
      tags:
      - slack
  /api/v1/slack/channels:
    get:
      description: 獲取當前配置的所有 Slack 頻道映射
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes_api_v1_slack.ChannelsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
      security:
      - BasicAuth: []
      summary: 獲取 Slack 頻道配置
      tags:
      - slack
  /api/v1/slack/level/{level}:
    post:
      consumes:
      - application/json
      description: 發送訊息到指定等級對應的 Slack 頻道
      parameters:
      - description: '等級名稱 (例如: emergency, critical, warning, info)'
        in: path
        name: level
        required: true
        type: string
      - description: 發送訊息請求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/routes_api_v1_slack.SendMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
      security:
      - BasicAuth: []
      summary: 發送 Slack 訊息到指定等級
      tags:
      - slack
  /api/v1/slack/rich/{channel}:
    post:
      consumes:
      - application/json
      description: 發送包含附件和字段的富文本訊息到指定 Slack 頻道
      parameters:
      - description: '頻道名稱 (例如: alerts, emergency)'
        in: path
        name: channel
        required: true
        type: string
      - description: 富文本訊息請求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/routes_api_v1_slack.RichMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
      security:
      - BasicAuth: []
      summary: 發送富文本 Slack 訊息
      tags:
      - slack
  /api/v1/slack/status:
    get:
      description: 獲取 Slack 服務的當前狀態和配置信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes_api_v1_slack.StatusResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
      security:
      - BasicAuth: []
      summary: 獲取 Slack 服務狀態
      tags:
      - slack
  /api/v1/slack/test:
    post:
      consumes:
      - application/json
      description: 發送測試訊息到預設頻道以驗證 Slack 連接
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
      security:
      - BasicAuth: []
      summary: 測試 Slack 連接
      tags:
      - slack
  /api/v1/slack/validate/{channel}:
    post:
      description: 檢查 Bot 是否已加入指定頻道，如果未加入會提供加入指引
      parameters:
      - description: '頻道名稱 (例如: alerts, emergency)'
        in: path
        name: channel
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/routes_api_v1_slack.SendMessageResponse'
      security:
      - BasicAuth: []
      summary: 驗證 Slack 頻道
      tags:
      - slack
  /api/v1/telegram/chatid_{chatid}:
    post:
      consumes:
      - application/json
      description: Send message to specified Telegram chat level
      parameters:
      - description: '聊天等級 (格式: L{0-4})'
        in: path
        name: chatid
        required: true
        type: string
      - description: 訊息內容
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/routes_api_v1_telegram.SendMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes_api_v1_telegram.SendMessageResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: Send Telegram message
      tags:
      - telegram
  /api/v1/telegram/info:
    get:
      description: 獲取 Telegram 機器人的基本資訊
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 獲取機器人資訊
      tags:
      - telegram
  /discord/channel/{channel}:
    post:
      consumes:
      - application/json
      description: Send a message to a specific Discord channel
      parameters:
      - description: Discord Channel ID
        in: path
        name: channel
        required: true
        type: string
      - description: Message request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/routes_api_v1_discord.SendMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes_api_v1_discord.SendMessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes_api_v1_discord.SendMessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes_api_v1_discord.SendMessageResponse'
      summary: Send message to Discord channel
      tags:
      - discord
  /discord/chatid_L{level}:
    post:
      consumes:
      - application/json
      description: Send a message to a Discord channel based on alert level
      parameters:
      - description: Alert Level (0-5)
        in: path
        name: level
        required: true
        type: string
      - description: Message request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/routes_api_v1_discord.SendMessageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes_api_v1_discord.SendMessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes_api_v1_discord.SendMessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes_api_v1_discord.SendMessageResponse'
      summary: Send message to Discord level channel
      tags:
      - discord
  /discord/status:
    get:
      description: Get the status of Discord service and bot information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes_api_v1_discord.StatusResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes_api_v1_discord.StatusResponse'
      summary: Get Discord service status
      tags:
      - discord
  /discord/test/{channel}:
    post:
      description: Send a test message to verify channel accessibility
      parameters:
      - description: Discord Channel ID
        in: path
        name: channel
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes_api_v1_discord.SendMessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes_api_v1_discord.SendMessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes_api_v1_discord.SendMessageResponse'
      summary: Test Discord channel
      tags:
      - discord
  /discord/validate/{channel}:
    post:
      description: Validate if the bot can access and send messages to the channel
      parameters:
      - description: Discord Channel ID
        in: path
        name: channel
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/routes_api_v1_discord.SendMessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/routes_api_v1_discord.SendMessageResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/routes_api_v1_discord.SendMessageResponse'
      summary: Validate Discord channel
      tags:
      - discord
  /healthz:
    get:
      description: 返回伺服器健康狀態
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 健康檢查端點
      tags:
      - system
